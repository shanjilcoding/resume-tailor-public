<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Defense-in-depth: API keys live in localStorage, so the highest-value rule
      here is connect-src — it limits where the page can send data to your own
      origin and the three AI providers, blocking key exfiltration to anywhere else.
      'unsafe-inline'/ws: are required for Vite dev + Tailwind; tighten at the host
      layer in production if you serve real CSP headers.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com; base-uri 'self'; form-action 'self'" />
    <title>Resume Tailor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
